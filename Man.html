<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANSIN AI - Fast Load</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #020617; color: #f8fafc; }
        .movie-viewport { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #334155; }
        .scene-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .scene-img.active { opacity: 1; }
        .subtitle-box { position: absolute; bottom: 6%; left: 0; right: 0; text-align: center; z-index: 50; padding: 0 10%; }
        .subtitle-text { background: rgba(0, 0, 0, 0.7); padding: 5px 15px; border-radius: 8px; font-size: 1rem; color: white; backdrop-filter: blur(4px); display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-indigo-400">🎬 MANSIN AI MOVIE</h1>
        </header>

        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="topicInput" placeholder="ใส่หัวข้อนิทาน..." 
                    class="flex-grow p-3 rounded-xl bg-slate-950 border border-slate-700 text-white outline-none">
                <button onclick="fastPrepare()" id="btnGen" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-bold transition-all">
                    สร้างทันที 🚀
                </button>
            </div>
        </div>

        <div id="playerArea" class="hidden">
            <div class="movie-viewport shadow-2xl" id="viewport">
                <div class="subtitle-box"><span id="subLabel" class="subtitle-text">...</span></div>
                
                <div id="overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-[100]">
                    <div id="statusMsg" class="text-indigo-300 text-sm mb-4">กำลังวาดภาพแรก...</div>
                    <button id="startPlayBtn" onclick="actuallyStart()" class="hidden bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-indigo-100 scale-110 shadow-2xl">
                        ▶️ เริ่มฉายนิทาน
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Magical-Fantasy-Music.mp3" type="audio/mpeg">
    </audio>

    <script>
        let movieData = [];
        const synth = window.speechSynthesis;

        async function fastPrepare() {
            const topic = document.getElementById('topicInput').value.trim();
            if(!topic) return alert("ระบุหัวข้อก่อนครับ");

            document.getElementById('playerArea').classList.remove('hidden');
            document.getElementById('btnGen').disabled = true;
            document.getElementById('statusMsg').innerText = "กำลังวาดภาพแรก... (อาจใช้เวลา 5-10 วินาที)";
            document.getElementById('startPlayBtn').classList.add('hidden');
            document.getElementById('overlay').classList.remove('hidden');

            movieData = [
                { text: `กาลครั้งหนึ่งนานมาแล้ว มี${topic}ที่ร่าเริงอาศัยอยู่`, prompt: `${topic} cute fairytale style, vibrant colors` },
                { text: `วันหนึ่ง ${topic}ได้ออกเดินทางไปพบกับความตื่นเต้น`, prompt: `${topic} adventure forest, cinematic` },
                { text: `และแล้ว ${topic}ก็มีความสุขในดินแดนที่สวยงามตลอดไป`, prompt: `${topic} happy ending, magical kingdom, sunset` }
            ];

            const viewport = document.getElementById('viewport');
            viewport.querySelectorAll('.scene-img').forEach(el => el.remove());

            // โหลดรูปแรกรูปเดียวพอเพื่อเริ่มงาน
            const firstImg = new Image();
            firstImg.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(movieData[0].prompt)}?width=1000&height=560&nologo=true&seed=${Math.floor(Math.random()*100)}`;
            firstImg.id = `scene-0`;
            firstImg.className = 'scene-img';
            firstImg.onload = () => {
                document.getElementById('statusMsg').innerText = "ภาพแรกพร้อมแล้ว!";
                document.getElementById('startPlayBtn').classList.remove('hidden');
                // แอบโหลดรูปที่เหลือต่อ
                loadRemainingImages();
            };
            viewport.prepend(firstImg);
        }

        function loadRemainingImages() {
            const viewport = document.getElementById('viewport');
            for(let i=1; i < movieData.length; i++) {
                const img = new Image();
                img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(movieData[i].prompt)}?width=1000&height=560&nologo=true&seed=${Math.floor(Math.random()*100)}`;
                img.id = `scene-${i}`;
                img.className = 'scene-img';
                viewport.prepend(img);
            }
        }

        function actuallyStart() {
            document.getElementById('overlay').classList.add('hidden');
            const music = document.getElementById('bgMusic');
            music.volume = 0.15;
            music.play();
            startScene(0);
        }

        function startScene(index) {
            if(index >= movieData.length) return;

            const targetImg = document.getElementById(`scene-${index}`);
            if(targetImg) {
                document.querySelectorAll('.scene-img').forEach(img => img.classList.remove('active'));
                targetImg.classList.add('active');
            }
            
            document.getElementById('subLabel').innerText = movieData[index].text;

            const utter = new SpeechSynthesisUtterance(movieData[index].text);
            utter.lang = 'th-TH';
            utter.rate = 0.9;
            
            utter.onend = () => {
                setTimeout(() => startScene(index + 1), 1200);
            };

            synth.speak(utter);
        }
    </script>
</body>
</html>
